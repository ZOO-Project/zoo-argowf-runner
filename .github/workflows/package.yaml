name: package

on:
  push:
    branches:
      - feature
      - feature/**
      - develop
      - main
    tags:
      - v*.*.*
  pull_request:
    branches:
      - feature
      - feature/**
      - develop
      - main

permissions:
  contents: read

jobs:
  ci:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tooling
        run: pip install hatch ruff

      - name: Ruff Check
        run: ruff check .

      - name: Ruff Lint
        run: ruff format --check .

      - name: Run tests
        run: hatch run test:test-q

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Hatch
        run: pip install hatch

      - name: Verify tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(hatch version)"
          echo "Tag version: ${TAG_VERSION}"
          echo "Project version: ${PROJECT_VERSION}"
          if [ "${TAG_VERSION}" != "${PROJECT_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version ${PROJECT_VERSION}"
            exit 1
          fi

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1