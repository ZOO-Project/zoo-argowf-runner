name: Publish to PyPI

on:
  push:
    branches:
    - feature/update(zoo-argowf-runner)
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install hatch
       
      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .    

      - name: Update version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          ABOUT_FILE=$(git ls-files "*__about__.py" | head -n 1)
          export ABOUT_FILE
          python .github/scripts/bump_version.py
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "$ABOUT_FILE"
          git commit -m "chore: bump version to ${NEW_VERSION}" || echo "No changes to commit"
          git tag "v${NEW_VERSION}"
          git push origin HEAD --tags

      - name: Build package
        run: hatch build

      - name: Publish to PyPI (trusted publishing)
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          generate_release_notes: true